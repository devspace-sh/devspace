apiVersion: apps/v1
kind: Deployment
metadata:
  name: sync-replicas
  labels:
    app.kubernetes.io/name: sync-replicas
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: sync-replicas
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sync-replicas
    spec:
      containers:
        - name: app
          image: alpine:3.20
          command: ["tail", "-f", "/dev/null"]
